<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>AI Chat Bot</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .bot {
      background: #1e293b;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #020617;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
  <input type="text" id="message" placeholder="Mesaj yaz...">
  <button onclick="sendMessage()">Gönder</button>
</div>

<script>
const API_KEY = "BURAYA_API_KEY"; // Gemini API key
const chatDiv = document.getElementById("chat");

let history = [];

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.innerText = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("message");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  history.push({
    role: "user",
    parts: [{ text }]
  });

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "Yazıyor...";
  chatDiv.appendChild(typing);

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: history
        })
      }
    );

    const data = await res.json();

    typing.remove();

    const reply =
      data.candidates?.[0]?.content?.parts?.[0]?.text ||
      "Cevap alınamadı.";

    addMessage(reply, "bot");

    history.push({
      role: "model",
      parts: [{ text: reply }]
    });

  } catch (err) {
    typing.innerText = "Hata oluştu!";
    console.error(err);
  }
}
</script>

</body>
</html>
