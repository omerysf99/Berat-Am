<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI - Süper Sonik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .chat-container { height: calc(100vh - 160px); overflow-y: auto; scrollbar-width: none; padding: 20px 10%; }
        .chat-container::-webkit-scrollbar { display: none; }
        .message-ai { display: flex; gap: 1.5rem; margin-bottom: 2rem; animation: fadeIn 0.4s ease; }
        .message-user { background: #282a2d; padding: 12px 24px; border-radius: 24px; max-width: 80%; align-self: flex-end; margin-bottom: 2rem; }
        .ai-avatar { width: 36px; height: 36px; background: linear-gradient(45deg, #4285f4, #9b72cb); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px 10%; background: #131314; }
        .input-box { background: #1e1f20; border-radius: 32px; padding: 12px 24px; display: flex; align-items: center; gap: 15px; border: 1px solid transparent; transition: 0.3s; }
        .input-box:focus-within { border-color: #4285f4; background: #282a2d; }
        textarea { background: transparent; border: none; outline: none; color: white; flex: 1; resize: none; max-height: 150px; font-size: 16px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        code { background: #000; padding: 2px 6px; border-radius: 4px; color: #4285f4; }
        pre { background: #000; padding: 15px; border-radius: 12px; margin: 10px 0; overflow-x: auto; }
        .typing { display: none; margin-left: 55px; color: #8e918f; font-size: 14px; }
    </style>
</head>
<body class="flex flex-col">

    <header class="p-6 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center gap-2">
            <span class="text-xl font-semibold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">Gemini 1.5 Flash</span>
        </div>
        <i class="fa-solid fa-circle-user text-2xl text-gray-400"></i>
    </header>

    <div class="chat-container flex flex-col" id="chat-box">
        <div class="message-ai">
            <div class="ai-avatar"><i class="fa-solid fa-wand-magic-sparkles text-white text-xs"></i></div>
            <div class="prose prose-invert">Merhaba! API bağlantısı kuruldu. Senin için ne yapabilirim?</div>
        </div>
    </div>

    <div id="typing" class="typing"><i class="fa-solid fa-ellipsis fa-beat-fade"></i> Gemini düşünüyor...</div>

    <div class="input-area">
        <div class="input-box">
            <button class="text-gray-400 hover:text-white"><i class="fa-solid fa-plus"></i></button>
            <textarea id="user-input" rows="1" placeholder="Buraya bir şeyler yazın..."></textarea>
            <button id="send-btn" class="text-blue-400 hover:text-blue-200 transition">
                <i class="fa-solid fa-paper-plane text-xl"></i>
            </button>
        </div>
        <p class="text-center text-[10px] text-gray-500 mt-2">Bu chatbot sağladığın API anahtarı ile çalışmaktadır.</p>
    </div>

    <script>
        const API_KEY = "AIzaSyDg5sjwrI2784sEeFGOQRz5lk6nqtbMrAI";
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typing = document.getElementById('typing');

        async function askGemini() {
            const prompt = userInput.value.trim();
            if (!prompt) return;

            // Kullanıcı Mesajı
            appendMessage('user', prompt);
            userInput.value = '';
            userInput.style.height = 'auto';
            typing.style.display = 'block';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiResponse = data.candidates[0].content.parts[0].text;
                typing.style.display = 'none';
                appendMessage('ai', aiResponse);

            } catch (error) {
                typing.style.display = 'none';
                appendMessage('ai', "❌ **Hata oluştu:** " + error.message);
                console.error(error);
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'message-user' : 'message-ai';
            
            if (role === 'ai') {
                div.innerHTML = `
                    <div class="ai-avatar"><i class="fa-solid fa-wand-magic-sparkles text-white text-xs"></i></div>
                    <div class="prose prose-invert">${marked.parse(text)}</div>
                `;
            } else {
                div.innerText = text;
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Enter ile gönder
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askGemini();
            }
        });

        // textarea otomatik büyüme
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        sendBtn.addEventListener('click', askGemini);
    </script>
</body>
</html>
