<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Ultra Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --gemini-bg: #131314; --gemini-surface: #1e1f20; --gemini-blue: #4285f4; }
        body { background-color: var(--gemini-bg); color: #e3e3e3; font-family: 'Google Sans', Arial, sans-serif; overflow: hidden; }
        .sidebar { width: 280px; background: #1a1a1c; transition: all 0.3s ease; }
        .chat-area { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        .messages-container { flex: 1; overflow-y: auto; padding: 2rem 15% 10rem 15%; scroll-behavior: smooth; }
        .message { margin-bottom: 2.5rem; animation: fadeInUp 0.5s ease forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .ai-avatar { background: linear-gradient(45deg, #4285f4, #9b72cb, #d96570); width: 35px; height: 35px; border-radius: 50%; }
        .user-message { background: #282a2d; padding: 12px 20px; border-radius: 1.5rem; display: inline-block; align-self: flex-end; }
        .input-wrapper { position: absolute; bottom: 2rem; left: 15%; right: 15%; background: var(--gemini-surface); border-radius: 2rem; padding: 0.8rem 1.5rem; border: 1px solid #3c4043; transition: 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .input-wrapper:focus-within { background: #282a2d; border-color: #5f6368; }
        pre code { border-radius: 10px; margin: 10px 0; font-size: 0.9rem; }
        .typing-dot { width: 6px; height: 6px; background: #8e918f; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; } .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="flex">

    <aside class="sidebar hidden md:flex flex-col p-4 shadow-xl">
        <button class="bg-[#1e1f20] hover:bg-[#333537] py-3 px-4 rounded-full text-sm font-medium mb-8 flex items-center gap-2">
            <span class="text-xl">+</span> Yeni Sohbet
        </button>
        <div class="flex-1 overflow-y-auto space-y-2">
            <p class="text-xs text-gray-500 uppercase font-bold px-2">Geçmiş</p>
            <div class="p-2 hover:bg-[#282a2d] rounded-lg cursor-pointer text-sm truncate">Süper Sonik Kod Projesi</div>
            <div class="p-2 hover:bg-[#282a2d] rounded-lg cursor-pointer text-sm truncate">Gemini UI Tasarımı</div>
        </div>
    </aside>

    <main class="chat-area">
        <header class="p-4 flex justify-between items-center bg-[#131314]/80 backdrop-blur-md sticky top-0 z-10">
            <div class="text-lg font-semibold text-gray-300">Gemini <span class="text-blue-400 font-light text-sm italic">Ultra</span></div>
            <div class="flex gap-4 items-center">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500"></div>
                <img src="https://ui-avatars.com/api/?name=User&background=random" class="w-8 h-8 rounded-full" alt="User">
            </div>
        </header>

        <div class="messages-container" id="chat-box">
            <div class="message flex gap-5">
                <div class="ai-avatar flex items-center justify-center"><i class="fas fa-sparkles text-white text-xs"></i></div>
                <div class="flex-1">
                    <h2 class="text-2xl font-medium mb-4">Merhaba, ben Gemini.</h2>
                    <p class="text-gray-400">Size bugün nasıl yardımcı olabilirim? Kod yazabilirim, metinleri özetleyebilirim veya sadece sohbet edebiliriz.</p>
                </div>
            </div>
        </div>

        <div id="typing" class="hidden absolute bottom-32 left-[18%] flex gap-1">
            <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        </div>

        <div class="input-wrapper flex items-center gap-3">
            <button class="text-gray-400 hover:text-white"><i class="fa-solid fa-image"></i></button>
            <textarea id="user-input" rows="1" class="bg-transparent border-none outline-none flex-1 text-white resize-none" placeholder="Buraya bir soru yazın..."></textarea>
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-500 p-2 rounded-full w-10 h-10 flex items-center justify-center transition">
                <i class="fa-solid fa-arrow-up text-white text-sm"></i>
            </button>
        </div>
    </main>

    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
    <script>
        const API_KEY = "BURAYA_API_ANAHTARINI_YAPISTIR"; 
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing');

        let chatHistory = []; // Bellek yönetimi (Önceki mesajları hatırlar)

        async function handleChat() {
            const prompt = userInput.value.trim();
            if (!prompt) return;

            // Kullanıcı mesajını ekle
            addMessage('user', prompt);
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // UI Güncelle
            typingIndicator.classList.remove('hidden');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [...chatHistory, { parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                // Belleğe ekle
                chatHistory.push({ role: "user", parts: [{ text: prompt }] });
                chatHistory.push({ role: "model", parts: [{ text: aiText }] });

                typingIndicator.classList.add('hidden');
                addMessage('ai', aiText);

            } catch (err) {
                typingIndicator.classList.add('hidden');
                addMessage('ai', "❌ **Hata:** API anahtarı geçersiz veya internet bağlantısı yok. Lütfen kodu kontrol edin.");
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message flex gap-5 ${role === 'user' ? 'justify-end' : ''}`;
            
            const htmlContent = marked.parse(text); // Markdown render

            if (role === 'ai') {
                div.innerHTML = `
                    <div class="ai-avatar flex-shrink-0"></div>
                    <div class="prose prose-invert max-w-none text-gray-200">
                        ${htmlContent}
                    </div>
                `;
            } else {
                div.innerHTML = `<div class="user-message">${text}</div>`;
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            // Kod bloklarını renklendir
            document.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
        }

        // Event Listeners
        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleChat();
            }
        });

        // Otomatik TextArea yüksekliği
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
