<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #343541;
    color: white;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: #202123;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.new-chat {
    padding: 10px;
    border: 1px solid #555;
    cursor: pointer;
    margin-bottom: 10px;
    text-align: center;
}

.history {
    flex: 1;
    overflow-y: auto;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #555;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    margin: 10px 0;
    max-width: 700px;
}

.user {
    align-self: flex-end;
    background: #444654;
    padding: 10px;
    border-radius: 8px;
}

.bot {
    background: #444654;
    padding: 10px;
    border-radius: 8px;
}

/* Input */
.input-area {
    padding: 15px;
    border-top: 1px solid #555;
    display: flex;
    justify-content: center;
}

.input-box {
    width: 100%;
    max-width: 700px;
    display: flex;
    background: #40414f;
    border-radius: 10px;
    padding: 10px;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    outline: none;
}

button {
    background: #19c37d;
    border: none;
    padding: 8px 12px;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="new-chat" onclick="newChat()">+ Yeni Sohbet</div>
    <div class="history" id="history"></div>
</div>

<div class="main">
    <div class="header">Gemini AI</div>
    <div class="chat" id="chat"></div>

    <div class="input-area">
        <div class="input-box">
            <input id="input" placeholder="Mesaj gönder..." />
            <button onclick="send()">➤</button>
        </div>
    </div>
</div>

<script>
const API_KEY = "BURAYA_YENI_API_KEY";

let messages = [];

function addMessage(text, role) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "msg " + role;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function newChat() {
    document.getElementById("chat").innerHTML = "";
    messages = [];
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    messages.push({ role: "user", parts: [{ text }] });
    input.value = "";

    addMessage("Yazıyor...", "bot");

    try {
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: messages
                })
            }
        );

        const data = await res.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Cevap yok";

        document.querySelector(".bot:last-child").remove();

        addMessage(reply, "bot");
        messages.push({ role: "model", parts: [{ text: reply }] });

    } catch (e) {
        document.querySelector(".bot:last-child").remove();
        addMessage("Hata oluştu!", "bot");
        console.error(e);
    }
}

document.getElementById("input").addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
