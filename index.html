<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bağımsız AI Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chat-container { max-width: 700px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .user-msg { background: #37393b; border-radius: 18px; padding: 12px 18px; align-self: flex-end; margin-bottom: 15px; max-width: 85%; }
        .ai-msg { display: flex; gap: 12px; margin-bottom: 20px; animation: fadeIn 0.4s; }
        .ai-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #1a73e8, #c61ad9); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .input-box { background: #1e1f20; border-radius: 28px; padding: 10px 20px; border: 1px solid #444; }
        input { background: transparent; border: none; color: white; outline: none; flex: 1; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="chat-container">
    <header class="p-4 border-b border-gray-800 flex items-center gap-3">
        <div class="ai-icon"><i class="fas fa-brain text-white text-xs"></i></div>
        <h1 class="text-lg font-semibold">Yerel Zeka (Offline)</h1>
    </header>

    <div class="messages flex flex-col" id="chat-window">
        <div class="ai-msg">
            <div class="ai-icon">✨</div>
            <div>Merhaba! Şu an tamamen internetten bağımsız, kendi algoritmamla çalışıyorum. Bana ne sormak istersin?</div>
        </div>
    </div>

    <div class="p-4">
        <div class="input-box flex items-center">
            <input type="text" id="user-input" placeholder="Mesajınızı yazın..." autocomplete="off">
            <button id="send-btn" class="text-blue-400 ml-2"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Basit Karar Mekanizması (Zeka Taklidi)
    const brain = {
        "merhaba": ["Selam! Sana nasıl yardımcı olabilirim?", "Merhaba, seni gördüğüme sevindim.", "Hey! Neler yapıyoruz bugün?"],
        "nasılsın": ["Harikayım, işlemcilerim tıkır tıkır çalışıyor. Sen nasılsın?", "Bir yapay zeka olarak her zaman formdayım!", "İyiyim, yeni şeyler öğrenmeye hazırım."],
        "kimsin": ["Ben senin için tasarlanmış, tarayıcı üzerinde çalışan bir yapay zeka simülasyonuyum.", "İnternete ihtiyaç duymayan bir chatbot'um."],
        "saat": [`Şu an saat tam olarak: ${new Date().toLocaleTimeString()}`],
        "ne yapabilirsin": ["Sorularını yanıtlayabilir, seninle sohbet edebilir ve matematiksel işlemler yapabilirim.", "Kelime analizi yaparak sana en uygun cevabı seçebilirim."],
        "varsayılan": ["Bu çok ilginç bir konu, biraz daha açar mısın?", "Bunu daha önce duymamıştım, anlatmaya devam et.", "Anlıyorum... Peki bu konuda başka ne düşünüyorsun?", "Hımm, ilginç bir bakış açısı."]
    };

    function generateResponse(input) {
        input = input.toLowerCase();
        
        // Matematik kontrolü (Örn: 5+5)
        if (/[0-9][-+*/][0-9]/.test(input)) {
            try { return "Hesapladım: " + eval(input); } catch(e) { return "Matematiksel bir hata oluştu."; }
        }

        // Anahtar kelime eşleştirme
        for (let key in brain) {
            if (input.includes(key)) {
                const choices = brain[key];
                return choices[Math.floor(Math.random() * choices.length)];
            }
        }
        
        // Eğer hiçbir şey bulamazsa
        return brain["varsayılan"][Math.floor(Math.random() * brain["varsayılan"].length)];
    }

    function chat() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        userInput.value = '';

        setTimeout(() => {
            const response = generateResponse(text);
            appendMessage('ai', response);
        }, 600);
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = role === 'user' ? 'user-msg' : 'ai-msg';
        div.innerHTML = role === 'ai' ? `<div class="ai-icon">🤖</div><div>${text}</div>` : text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    sendBtn.addEventListener('click', chat);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') chat(); });
</script>

</body>
</html>
