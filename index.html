<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ChatGPT UI - Gemini</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #343541;
    color: white;
    display: flex;
    height: 100vh;
}
.sidebar {
    width: 250px;
    background: #202123;
    padding: 10px;
}
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}
.msg {
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    max-width: 700px;
}
.user { background: #444654; }
.bot { background: #444654; }
.input-area {
    padding: 10px;
    border-top: 1px solid #555;
}
input {
    width: 80%;
    padding: 10px;
}
button {
    padding: 10px;
}
</style>
</head>

<body>

<div class="sidebar">Gemini AI</div>

<div class="main">
    <div class="chat" id="chat"></div>

    <div class="input-area">
        <input id="input" placeholder="Mesaj yaz..." />
        <button onclick="send()">Gönder</button>
    </div>
</div>

<script>
const API_KEY = "BURAYA_YENI_API_KEY";

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    add(text, "user");
    input.value = "";

    add("Yazıyor...", "bot");

    try {
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: text }]
                    }]
                })
            }
        );

        const data = await res.json();
        console.log(data);

        const reply =
            data.candidates?.[0]?.content?.parts?.[0]?.text ||
            "Cevap alınamadı (API hata verdi)";

        document.querySelector(".bot:last-child").remove();
        add(reply, "bot");

    } catch (err) {
        document.querySelector(".bot:last-child").remove();
        add("HATA: API çalışmadı", "bot");
        console.error(err);
    }
}

function add(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
}

document.getElementById("input").addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
