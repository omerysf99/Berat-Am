<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Segoe UI', sans-serif; }
        .chat-container { max-width: 800px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; }
        .user-msg { background-color: #37393b; border-radius: 20px; padding: 10px 20px; max-width: 80%; align-self: flex-end; margin-bottom: 20px; }
        .ai-msg { display: flex; gap: 15px; margin-bottom: 30px; line-height: 1.6; }
        .ai-icon { width: 30px; height: 30px; background: linear-gradient(45deg, #4285f4, #9b72cb); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .input-area { padding: 20px; position: sticky; bottom: 0; background-color: #131314; }
        .input-box { background-color: #1e1f20; border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; border: 1px solid transparent; transition: 0.3s; }
        .input-box:focus-within { border-color: #4285f4; background-color: #282a2d; }
        input { background: transparent; border: none; color: white; outline: none; flex: 1; padding: 10px; font-size: 16px; }
        .loading { display: none; margin-left: 45px; color: #8e918f; font-style: italic; }
        pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; margin-top: 10px; }
    </style>
</head>
<body>

<div class="chat-container">
    <header class="p-6 flex justify-between items-center">
        <h1 class="text-xl font-medium text-gray-300">Gemini <span class="text-xs bg-gray-700 px-2 py-1 rounded">Flash 3.0</span></h1>
        <i class="fa-solid fa-user-circle text-2xl"></i>
    </header>

    <div class="messages flex flex-col" id="chat-window">
        <div class="ai-msg">
            <div class="ai-icon"><i class="fa-solid fa-wand-sparkles text-xs"></i></div>
            <div>Merhaba! Ben Gemini. Bugün sana nasıl yardımcı olabilirim?</div>
        </div>
    </div>

    <div id="loading" class="loading">Gemini düşünüyor...</div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Buraya bir şeyler yazın..." autocomplete="off">
            <button id="send-btn" class="text-blue-400 hover:text-blue-300 p-2">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
        <p class="text-center text-xs text-gray-500 mt-3">Gemini hata yapabilir. Önemli bilgileri kontrol etmeyi unutmayın.</p>
    </div>
</div>

<script>
    const API_KEY = "BURAYA_API_KEY_GELECEK"; // Güvenlik için burayı temizledim, kendi key'ini yapıştır.
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const loading = document.getElementById('loading');

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Kullanıcı mesajını ekrana bas
        appendMessage('user', text);
        userInput.value = '';
        loading.style.display = 'block';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;
            
            loading.style.display = 'none';
            appendMessage('ai', aiResponse);
        } catch (error) {
            console.error("Hata:", error);
            loading.style.display = 'none';
            appendMessage('ai', "Üzgünüm, bir hata oluştu. Lütfen API anahtarını kontrol et.");
        }
    }

    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = role === 'user' ? 'user-msg' : 'ai-msg';
        
        if (role === 'ai') {
            msgDiv.innerHTML = `
                <div class="ai-icon"><i class="fa-solid fa-wand-sparkles text-xs"></i></div>
                <div class="prose prose-invert">${formatText(text)}</div>
            `;
        } else {
            msgDiv.innerText = text;
        }
        
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Basit Markdown formatlama (Kod blokları ve satır sonları için)
    function formatText(text) {
        return text
            .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
            .replace(/\n/g, '<br>');
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
