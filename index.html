<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berat AM - AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        
        body { background-color: #131314; color: #e3e3e3; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Glassmorphism Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #37393b; border-radius: 10px; }

        .chat-container { flex: 1; overflow-y: auto; padding: 20px 15%; }
        @media (max-width: 768px) { .chat-container { padding: 20px 5%; } }

        .message-ai { display: flex; gap: 1.5rem; margin-bottom: 2.5rem; animation: fadeIn 0.5s ease; }
        .message-user { background: #282a2d; padding: 14px 24px; border-radius: 24px; max-width: 85%; align-self: flex-end; margin-bottom: 2.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .ai-avatar { width: 38px; height: 38px; background: linear-gradient(135deg, #4285f4, #9b72cb, #d96570); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        .input-area { padding: 20px 15%; background: linear-gradient(transparent, #131314 30%); }
        .input-box { background: #1e1f20; border-radius: 32px; padding: 10px 20px; display: flex; align-items: center; gap: 12px; border: 1px solid #3c4043; }
        .input-box:focus-within { border-color: #8e918f; background: #282a2d; }
        
        textarea { background: transparent; border: none; outline: none; color: white; flex: 1; resize: none; max-height: 200px; font-size: 16px; line-height: 1.5; padding: 8px 0; }
        
        .code-block { background: #000; border-radius: 12px; padding: 15px; margin: 10px 0; border: 1px solid #333; font-family: monospace; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .loading-dots span { animation: blink 1.4s infinite both; font-size: 20px; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center border-b border-[#3c4043] bg-[#131314] z-10">
        <div class="flex items-center gap-3">
            <div class="text-2xl font-semibold tracking-tight">
                <span class="text-white">Berat</span> <span class="text-blue-500">AM</span>
            </div>
            <span class="text-[10px] bg-[#37393b] text-gray-400 px-2 py-0.5 rounded-full uppercase tracking-widest">Ultra 1.5</span>
        </div>
        <div class="flex items-center gap-4 text-gray-400 text-sm">
            <i class="fa-solid fa-gear cursor-pointer hover:text-white transition"></i>
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-orange-400 to-yellow-200"></div>
        </div>
    </header>

    <div class="chat-container flex flex-col" id="chat-box">
        <div class="message-ai">
            <div class="ai-avatar"><i class="fa-solid fa-bolt text-white text-sm"></i></div>
            <div class="flex-1">
                <h3 class="font-semibold text-blue-400 mb-1">Berat AM AI</h3>
                <div class="prose prose-invert text-gray-300">Merhaba! Ben Berat AM özel yapay zekası. Size nasıl yardımcı olabilirim?</div>
            </div>
        </div>
    </div>

    <div id="typing" class="hidden px-[15%] mb-4 flex items-center gap-2 text-gray-500">
        <div class="loading-dots text-blue-500"><span>•</span><span>•</span><span>•</span></div>
        <span class="text-sm italic">Analiz ediliyor...</span>
    </div>

    <div class="input-area">
        <div class="input-box shadow-2xl">
            <button class="text-gray-400 hover:text-white p-2 transition"><i class="fa-solid fa-paperclip"></i></button>
            <textarea id="user-input" rows="1" placeholder="Berat AM'ye bir şeyler sor..."></textarea>
            <button id="send-btn" class="bg-white text-black w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-200 transition shadow-lg">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
        </div>
        <p class="text-center text-[11px] text-gray-600 mt-3 font-light">Berat AM AI, Google Gemini mimarisiyle güçlendirilmiştir.</p>
    </div>

    <script>
        const API_KEY = "AIzaSyDg5sjwrI2784sEeFGOQRz5lk6nqtbMrAI";
        // Modeli v1beta üzerinden çağırıyoruz ama endpoint yapısını düzelttik
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typing = document.getElementById('typing');

        async function getAIResponse() {
            const message = userInput.value.trim();
            if (!message) return;

            // UI Güncelle: Kullanıcı mesajı
            appendMessage('user', message);
            userInput.value = '';
            userInput.style.height = 'auto';
            typing.classList.remove('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: message }] }],
                        generationConfig: {
                            temperature: 0.7,
                            topK: 40,
                            topP: 0.95,
                            maxOutputTokens: 2048,
                        }
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    // Eğer 1.5 flash hata verirse 1.5 pro dene (Alternatif)
                    throw new Error(data.error.message);
                }

                const aiText = data.candidates[0].content.parts[0].text;
                typing.classList.add('hidden');
                appendMessage('ai', aiText);

            } catch (error) {
                typing.classList.add('hidden');
                appendMessage('ai', `⚠️ **Sistem Hatası:** ${error.message}\n\n*Lütfen API anahtarının aktif olduğundan emin olun.*`);
                console.error("Detaylı Hata:", error);
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'message-user' : 'message-ai';
            
            if (role === 'ai') {
                div.innerHTML = `
                    <div class="ai-avatar"><i class="fa-solid fa-bolt text-white text-sm"></i></div>
                    <div class="flex-1">
                        <h3 class="font-semibold text-blue-400 mb-1">Berat AM AI</h3>
                        <div class="prose prose-invert text-gray-200 leading-relaxed">${marked.parse(text)}</div>
                    </div>
                `;
            } else {
                div.innerHTML = `<div class="text-white">${text}</div>`;
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Eventler
        sendBtn.addEventListener('click', getAIResponse);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                getAIResponse();
            }
        });

        // Otomatik büyüyen kutu
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
