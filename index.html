<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gemini AI Chatbot</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.chat {
    width: 400px;
    height: 600px;
    background: #1e293b;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
}
.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}
.msg {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 75%;
}
.user { background: #3b82f6; align-self: flex-end; }
.bot { background: #475569; align-self: flex-start; }
.inputBox {
    display: flex;
}
input {
    flex: 1;
    padding: 10px;
    border: none;
    background: #0f172a;
    color: white;
}
button {
    padding: 10px;
    background: #3b82f6;
    border: none;
    color: white;
}
</style>
</head>
<body>

<div class="chat">
    <div class="messages" id="messages"></div>
    <div class="inputBox">
        <input id="input" placeholder="Mesaj yaz...">
        <button onclick="send()">Gönder</button>
    </div>
</div>

<script>
const API_KEY = "BURAYA_YENI_API_KEYINI_YAZ";

function add(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    add(text, "user");
    input.value = "";

    add("Yazıyor...", "bot");

    try {
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: text }]
                    }]
                })
            }
        );

        const data = await res.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Cevap alınamadı.";

        document.querySelector(".bot:last-child").remove();
        add(reply, "bot");

    } catch (err) {
        document.querySelector(".bot:last-child").remove();
        add("Hata oluştu!", "bot");
        console.error(err);
    }
}

document.getElementById("input").addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
